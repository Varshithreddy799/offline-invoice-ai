services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./database:/app/database
      - ./uploads:/app/uploads
    environment:
      - LLM_MODEL_PATH=/app/models/phi-3-mini-4k-instruct-q4.gguf
      - MODEL_CONTEXT=2048
      - MODEL_THREADS=0
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: "8G"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
