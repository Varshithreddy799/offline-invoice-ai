services:
  - type: web
    name: offline-invoice-ai-backend
    runtime: python
    repo: https://github.com/Varshithreddy799/offline-invoice-ai
    plan: free

    rootDir: backend

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER
        value: "true"
      - key: USE_MODEL
        value: "false"
      - key: USE_OCR
        value: "false"
      - key: UPLOAD_DIR
        value: "/tmp/uploads"

      - key: MODELS_DIR
        value: "/tmp/models"
      - key: MODEL_CONTEXT
        value: "2048"
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: offline-invoice-ai-frontend
    runtime: static
    repo: https://github.com/Varshithreddy799/offline-invoice-ai

    rootDir: frontend

    buildCommand: npm install && npm run build

    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://offline-invoice-ai-backend.onrender.com